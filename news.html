<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Новости ACSP</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="header-placeholder"></div>

<main>
<div class="news-modal" id="resourcesModal">
  <div class="news-modal-overlay" id="resourcesModalOverlay"></div>

  <div class="news-modal-content">
    <button class="news-modal-close" id="resourcesModalClose" type="button">×</button>
    <div class="news-modal-body" id="resourcesModalBody"></div>
  </div>
</div>

  <section class="news-page">
    <div class="news-page-head">
      <p>ACSP News</p>
      <h1>Новости компании</h1>
    </div>

    <div class="news-layout">

      <aside class="news-feed">
        <h2>Все новости</h2>
        <div id="newsList" class="news-list"></div>
      </aside>

      <section class="news-main">
        <div class="news-main-head">
          <h2>Важное</h2>
          <p>Главные обновления каталога, сервиса и технической поддержки ACSP.</p>
        </div>

        <div id="featuredNews" class="featured-news"></div>
      </section>

    </div>
  </section>

</main>


<div class="news-modal" id="newsModal">
  <div class="news-modal-overlay" id="newsModalOverlay"></div>
  <article class="news-modal-content">
    <button class="news-modal-close" id="newsModalClose" type="button">×</button>

    <p class="news-modal-date" id="modalDate"></p>
    <h2 id="modalTitle"></h2>
    <div id="modalBody" class="news-modal-body"></div>
  </article>
</div>

<div id="footer-placeholder"></div>

<script src="js/main.js"></script>
<script src="js/news.js"></script>
</body>
</html>
