<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Технические ресурсы ACSP</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="header-placeholder"></div>

<main>

  <section class="news-page">
    <div class="news-page-head">
      <p>ACSP Technical Resources</p>
      <h1>Технические ресурсы</h1>
    </div>

    <div class="news-layout">

      <aside class="news-feed">
        <h2>Все материалы</h2>

        <div class="news-list" id="resourcesList"></div>
      </aside>

      <section class="news-main">
        <div class="news-main-head">
          <h2>Важное</h2>
          <p>
            Инструкции, справочные материалы и рекомендации ACSP
            по обслуживанию компрессорного оборудования.
          </p>
        </div>
        <div class="featured-news" id="featuredResources"></div>
      </section>

    </div>
  </section>

</main>


<div class="news-modal" id="resourcesModal">
  <div class="news-modal-overlay" id="resourcesModalOverlay"></div>

  <div class="news-modal-content">
    <button class="news-modal-close" id="resourcesModalClose" type="button">×</button>
    <div class="news-modal-body" id="resourcesModalBody"></div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="js/main.js"></script>
<script src="js/resources.js"></script>
</body>
</html>
