<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Товар ACSP</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="header-placeholder"></div>

<main>

  <section class="product-page">

    <div class="product-back-wrap">
      <a href="javascript:history.back()" class="product-back">← Вернуться в каталог</a>
    </div>

    <div class="product-detail" id="productDetail">
      <div class="product-loading">
        Товар загружается...
      </div>
    </div>

    <div class="product-not-found" id="productNotFound">
      <h1>Товар не найден</h1>
      <p>
        Возможно, товар был удалён из каталога или ссылка указана неверно.
      </p>
      <a href="category.html?type=filters">Перейти в каталог</a>
    </div>

  </section>

</main>

<div id="footer-placeholder"></div>

<script src="js/main.js"></script>
</body>
</html>
